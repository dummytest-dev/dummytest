name: Sync version to pyproject.toml

on:
  push:
    paths:
      - "_dummytest/_version.py"

jobs:
  sync-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from _version.py
        id: get_version
        run: |
          VERSION=$(python -c "exec(open('_dummytest/_version.py').read()); print(__version__)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update pyproject.toml
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.get_version.outputs.version }}\"/" pyproject.toml

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet pyproject.toml && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "Sync version to ${{ steps.get_version.outputs.version }} in pyproject.toml"
          git push
